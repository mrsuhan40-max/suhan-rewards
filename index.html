<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suhan Rewards - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0b0f;color:white;font-family:'Poppins',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#1f2937;padding:2rem;border-radius:1rem;width:90%;max-width:400px;border:1px solid #374151}
.logo{font-family:'Orbitron',sans-serif;color:#facc15;text-align:center;font-size:2rem;margin-bottom:1rem;text-shadow:0 0 20px #facc15}
input{width:100%;padding:12px;margin:8px 0;background:#374151;border:1px solid #4b5563;border-radius:8px;color:white}
button{width:100%;padding:12px;margin-top:12px;background:#facc15;color:#000;border:none;border-radius:8px;font-weight:700;cursor:pointer}
button:hover{background:#fde047}
.hidden{display:none}
</style>
</head>
<body>
<div class="box" id="loginBox">
  <div class="logo">Suhan Rewards</div>
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
  <p style="color:#9ca3af;font-size:12px;margin-top:10px;text-align:center">Default: admin / admin123</p>
</div>

<div class="box hidden" id="adminBox">
  <div class="logo" style="font-size:1.5rem">Admin Panel 🔥</div>
  <p>Welcome Admin!</p>
  <button onclick="logout()" style="background:#ef4444;color:white;margin-top:20px">Logout</button>
</div>

<script>
function login(){
  const u=document.getElementById('user').value;
  const p=document.getElementById('pass').value;
  if(u==='admin' && p==='admin123'){
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('adminBox').classList.remove('hidden');
  }else{
    alert('Wrong Username or Password');
  }
}
function logout(){
  document.getElementById('adminBox').classList.add('hidden');
  document.getElementById('loginBox').classList.remove('hidden');
}
</script>
</body>
</html>
