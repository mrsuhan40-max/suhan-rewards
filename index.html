<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUHAN REWARDS</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap');
body{background:#0a0a0f;color:#fff;font-family:system-ui;min-height:100vh;display:flex;flex-direction:column}
.logo{font-family:'Poppins',sans-serif;letter-spacing:2px}
.neon{color:#facc15;text-shadow:0 0 15px #facc15,0 0 30px #facc15}
.btn{background:#facc15;color:#000;font-weight:bold}
.card{background:#1f2937}
.hidden{display:none}
.wheel{width:300px;height:300px;border:10px solid #facc15;border-radius:50%;position:relative;transition:transform 4s cubic-bezier(.17,.67,.83,.67)}
.wheel span{position:absolute;width:50%;height:50%;transform-origin:100% 100%;display:flex;align-items:center;justify-content:center;font-weight:bold}
main{flex:1}
header,footer{border-bottom:1px solid #333;border-top:1px solid #333}
</style>
</head>
<body>

<header class="w-full text-center py-4">
<h1 class="text-4xl md:text-5xl font-extrabold logo neon">SUHAN REWARDS™</h1>
</header>

<main class="p-4">
<div id="auth" class="max-w-sm mx-auto mt-6 card p-6 rounded-2xl">
<h2 class="text-xl font-bold text-center mb-4">স্বাগতম</h2>
<input id="name" class="w-full p-2 mb-2 bg-gray-800 rounded hidden" placeholder="আপনার নাম">
<input id="email" class="w-full p-2 mb-2 bg-gray-800 rounded hidden" placeholder="ইমেইল">
<input id="user" class="w-full p-2 mb-2 bg-gray-800 rounded" placeholder="ইউজারনেম">
<input id="pass" type="password" class="w-full p-2 mb-4 bg-gray-800 rounded" placeholder="পাসওয়ার্ড">
<input id="ref" class="w-full p-2 mb-4 bg-gray-800 rounded hidden" placeholder="রেফার কোড থাকলে">
<button id="authBtn" onclick="login()" class="w-full p-2 rounded btn mb-2">লগইন</button>
<p class="text-center text-sm">নতুন? <span onclick="toggleAuth()" class="text-yellow-400 cursor-pointer">সাইনআপ করুন</span></p>
</div>

<div id="dash" class="hidden max-w-md mx-auto">
<h2 class="text-2xl font-bold text-center mb-4">ড্যাশবোর্ড</h2>
<div class="card p-4 rounded-2xl mb-3">হ্যালো, <b id="dName"></b></div>
<div class="card p-6 rounded-2xl mb-3 text-center">
<p>আপনার কয়েন</p><p id="dCoin" class="text-4xl font-bold neon">0</p>
<button onclick="dailyBonus()" id="bonusBtn" class="w-full mt-2 p-3 rounded btn">দৈনিক বোনাস +50</button>
</div>
<div class="card p-4 rounded-2xl mb-3">
<p>রেফার করুন +200 কয়েন</p>
<p id="refLink" class="text-sm bg-gray-800 p-2 rounded mt-2 break-all"></p>
</div>
<button onclick="showSpin()" class="w-full p-3 rounded btn mb-2">🎡 স্পিন করুন</button>
<button onclick="showShop()" class="w-full p-3 rounded bg-blue-600 mb-2">🛒 শপ</button>
<button onclick="logout()" class="w-full p-3 rounded bg-red-600">লগআউট</button>
</div>

<div id="spinPage" class="hidden text-center">
<h2 class="text-2xl font-bold mb-4">স্পিন হুইল</h2>
<p>আপনার স্পিন: <b id="spinLeft">0</b></p>
<div class="wheel mx-auto my-4" id="wheel"></div>
<button onclick="watchAd()" id="adBtn" class="p-3 rounded btn mb-2">Ad দেখে 5 স্পিন নিন</button>
<button onclick="spin()" id="spinBtn" class="p-3 rounded btn mb-2 hidden">Spin Now</button>
<p id="spinResult" class="text-xl"></p>
<button onclick="backDash()" class="mt-4 p-2 rounded bg-gray-700">ফিরে যান</button>
</div>

<div id="shopPage" class="hidden max-w-md mx-auto">
<h2 class="text-2xl font-bold text-center mb-4">শপ</h2>
<div class="card p-4 rounded-2xl mb-2" onclick="redeem('30Tk Recharge',300)">30Tk Recharge - 300 কয়েন</div>
<div class="card p-4 rounded-2xl mb-2" onclick="redeem('1GB 7Din',500)">1GB MB 7Din - 500 কয়েন</div>
<div class="card p-4 rounded-2xl mb-4" onclick="redeem('100 Diamond',5000)">100 Free Fire Diamond - 5000 কয়েন</div>
<button onclick="backDash()" class="w-full p-2 rounded bg-gray-700">ফিরে যান</button>
</div>
</main>

<footer class="w-full text-center p-4 text-gray-400 text-sm">
Copyright ©️ Suhan Rewards 2026 TM
</footer>

<script>
let users=JSON.parse(localStorage.getItem('users'))||{admin:{name:'Admin',email:'a@a.com',pass:'admin123',coin:9999,refBy:''}};
let currentUser=''; let isSignup=false; let spins=0;
const prizes=[10,10,20,20,50,50,100,100,200,250];

function toggleAuth(){isSignup=!isSignup;
name.classList.toggle('hidden');email.classList.toggle('hidden');ref.classList.toggle('hidden');
authBtn.innerText=isSignup?'সাইনআপ':'লগইন';}

function login(){
const u=user.value,p=pass.value;
if(isSignup){
if(users[u])return alert('User ase');
users[u]={name:name.value,email:email.value,pass:p,coin:0,refBy:ref.value};
if(ref.value&&users[ref.value]){users[ref.value].coin+=200;alert('রেফার বোনাস +200 বন্ধুকে দেওয়া হল')}
localStorage.setItem('users',JSON.stringify(users));alert('সাইনআপ সফল');
}
if(users[u]&&users[u].pass===p){currentUser=u;auth.classList.add('hidden');loadDash();}
else alert('ভুল তথ্য');
}

function loadDash(){
dash.classList.remove('hidden');
dName.innerText=users[currentUser].name;
dCoin.innerText=users[currentUser].coin;
refLink.innerText=location.origin+location.pathname+'?ref='+currentUser;
if(localStorage.getItem('bonus_'+currentUser+'_'+new Date().toDateString()))bonusBtn.disabled=true,bonusBtn.innerText='আজ বোনাস নিয়েছেন';
}

function dailyBonus(){
users[currentUser].coin+=50;save();loadDash();
localStorage.setItem('bonus_'+currentUser+'_'+new Date().toDateString(),1);
alert('দৈনিক বোনাস +50 কয়েন ✅');
}

function showSpin(){dash.classList.add('hidden');spinPage.classList.remove('hidden');
spins=parseInt(localStorage.getItem('spins_'+currentUser)||0);spinLeft.innerText=spins;
if(spins>0){spinBtn.classList.remove('hidden');adBtn.classList.add('hidden');}
makeWheel();}

function watchAd(){alert('15 সেকেন্ড Ad দেখুন...');
setTimeout(()=>{spins=5;localStorage.setItem('spins_'+currentUser,5);spinLeft.innerText=5;spinBtn.classList.remove('hidden');adBtn.classList.add('hidden');alert('5 স্পিন পেয়েছেন');},1500);}

function spin(){if(spins<=0)return;spins--;localStorage.setItem('spins_'+currentUser,spins);spinLeft.innerText=spins;
let deg=3600+Math.floor(Math.random()*3600);wheel.style.transform=`rotate(${deg}deg)`;
setTimeout(()=>{let prize=prizes[Math.floor(Math.random()*prizes.length)];
users[currentUser].coin+=prize;save();spinResult.innerText='আপনি পেয়েছেন: '+prize+' কয়েন 🎉';loadDash();},4000);
if(spins==0){spinBtn.classList.add('hidden');adBtn.classList.remove('hidden');}}

function showShop(){dash.classList.add('hidden');shopPage.classList.remove('hidden');}
function backDash(){spinPage.classList.add('hidden');shopPage.classList.add('hidden');dash.classList.remove('hidden');}
function redeem(item,cost){if(users[currentUser].coin<cost)return alert('কয়েন নেই');
users[currentUser].coin-=cost;save();let id=prompt(item+' নিতে আপনার Game ID / Number দিন');alert('Request গেছে Admin এর কাছে ✅');}

function makeWheel(){wheel.innerHTML='';prizes.forEach((p,i)=>{let s=document.createElement('span');s.style.transform=`rotate(${i*36}deg) skewY(-54deg)`;s.innerHTML=`<b style="transform:skewY(54deg) rotate(18deg)">${p}</b>`;wheel.appendChild(s);});}
function save(){localStorage.setItem('users',JSON.stringify(users));}
function logout(){currentUser='';dash.classList.add('hidden');auth.classList.remove('hidden');}
</script>
</body>
</html>
