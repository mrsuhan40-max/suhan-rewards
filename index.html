<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Suhan Rewards</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/kalpaz.github.io/kalpurush/font.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0b0b0f;color:white;font-family:'Poppins','Kalpurush',sans-serif;min-height:100vh;padding-bottom:60px}
    .logo-font{font-family:'Orbitron',sans-serif;text-shadow:0 0 20px #facc15;text-align:center;margin:4rem 0 2rem 0;line-height:1.1}
    .bg-black{background:#0b0b0f}.bg-gray-900{background:#1f2937}.bg-gray-700{background:#374151}.bg-yellow-400{background:#facc15}
    .text-yellow-400{color:#facc15}.text-gray-400{color:#9ca3af}.text-black{color:#000}
    .rounded-2xl{border-radius:1rem}.rounded-xl{border-radius:0.75rem}.rounded-lg{border-radius:0.5rem}.rounded-full{border-radius:9999px}
    .p-6{padding:1.5rem}.p-4{padding:1rem}.px-4{padding-left:1rem;padding-right:1rem}.pr-14{padding-right:3.5rem}.pb-20{padding-bottom:5rem}
    .w-full{width:100%}.w-72{width:18rem}.w-10{width:2.5rem}.h-10{height:2.5rem}.max-w-sm{max-width:24rem}.max-w-lg{max-width:32rem}.mx-auto{margin-left:auto;margin-right:auto}
    .grid{display:grid}.place-items-center{place-items:center}.flex{display:flex}.hidden{display:none}.relative{position:relative}.absolute{position:absolute}.sticky{position:sticky}
    .top-0{top:0}.right-4{right:1rem}.-top-3{top:-0.75rem}.left-1\/2{left:50%}
    .mt-4{margin-top:1rem}.mt-6{margin-top:1.5rem}
    .text-center{text-align:center}
    .flex-1{flex:1 1 0%}
  </style>
</head>
<body>
  <div class="grid place-items-center min-h-screen">
    <h1 class="logo-font text-4xl text-yellow-400">Suhan Rewards</h1>
    <p class="text-gray-400">Site Live 🔥</p>
  </div>
</body>
</html>
