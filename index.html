<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suhan Rewards</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background-color:#0a0a0f;color:#fff;font-family:system-ui}
.neon-yellow{color:#facc15;text-shadow:0 0 10px #facc15}
.btn-yellow{background-color:#facc15;color:#000;font-weight:bold}
</style>
</head>
<body class="flex items-center justify-center min-h-screen">
<div class="bg-gray-900 p-8 rounded-2xl shadow-lg w-80 text-center">
<h1 class="text-2xl font-bold neon-yellow mb-4">Suhan Rewards</h1>
<p class="mb-4 text-gray-300">লগইন করুন</p>
<input id="user" class="w-full p-2 mb-2 bg-gray-800 rounded" placeholder="Username">
<input id="pass" type="password" class="w-full p-2 mb-4 bg-gray-800 rounded" placeholder="Password">
<button onclick="login()" class="w-full p-2 rounded btn-yellow">Login</button>
<p class="text-xs text-gray-500 mt-2">Default: admin / admin123</p>
</div>
<script>
function login(){
const u=document.getElementById('user').value;
const p=document.getElementById('pass').value;
if(u==='admin'&&p==='admin123'){
alert('সফলভাবে লগইন হয়েছে! দৈনিক বোনাস পাবেন।');
}else{alert('ভুল তথ্য');}
</script>
</body>
</html>
